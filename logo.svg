<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 114" fill="none">
  <!-- bg -->
  <rect width="100" height="114" fill="white"/>

  <!-- ── Train body (black silhouette) ── -->
  <!-- Roof indicator strip -->
  <rect x="37" y="13.5" width="26" height="5" rx="1.5" fill="#0a0a0a"/>
  <!-- Main face -->
  <rect x="27" y="19" width="46" height="46" rx="3" fill="#0a0a0a"/>

  <!-- ── Windshield (white cutout) ── -->
  <rect x="31.5" y="23" width="37" height="27" rx="2.5" fill="white"/>
  <!-- Reflection diagonal -->
  <path d="M31.5 23 L43 23 L31.5 38 Z" fill="#0a0a0a"/>

  <!-- Separator strip (white) -->
  <rect x="27" y="57.5" width="46" height="3" fill="white"/>

  <!-- Headlights (white circles) -->
  <circle cx="38" cy="65" r="5.5" fill="white"/>
  <circle cx="62" cy="65" r="5.5" fill="white"/>

  <!-- ── Tunnel ring (drawn on top of body, below tracks) ── -->
  <circle cx="50" cy="46" r="32.5" fill="none" stroke="#0a0a0a" stroke-width="5.5"/>

  <!-- ── Coupler / buffer ── -->
  <path d="M42 70 L58 70 L55 79 L45 79 Z" fill="#0a0a0a"/>

  <!-- ── Tracks ── -->
  <!-- Left rail -->
  <path d="M31 79 L38 79 L27 114 L20 114 Z" fill="#0a0a0a"/>
  <!-- Right rail -->
  <path d="M62 79 L69 79 L80 114 L73 114 Z" fill="#0a0a0a"/>
  <!-- Track bed centre -->
  <path d="M38 79 L62 79 L73 114 L27 114 Z" fill="#0a0a0a"/>
  <!-- Crossties (white slashes) -->
  <rect x="29.5" y="82"   width="41" height="3" fill="white"/>
  <rect x="28"   y="88"   width="44" height="3" fill="white"/>
  <rect x="26.5" y="94"   width="47" height="3" fill="white"/>
  <rect x="25"   y="100.5" width="50" height="3" fill="white"/>
  <rect x="23.5" y="107"  width="53" height="3" fill="white"/>
</svg>
